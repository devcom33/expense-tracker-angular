<div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-8">

    </div>
</div>

    </div>
    </div>
</div>

<div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
    <div>
    <div class="inline-flex items-center justify-center w-14 h-14 bg-green-50 p-2 rounded-full">

    </div>

    </div>
</div>

    <div>
    <div class="inline-flex items-center justify-center w-14 h-14 bg-green-50 p-2 rounded-full">

        <h3 class="text-3xl font-bold text-gray-900 mt-2">{{maxExpense}}</h3>
    </div>

    </div>
</div>
</div>
<div class="mt-8 grid grid-cols-1 xl:grid-cols-2 gap-6">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 md:p-6 h-105">
    <ag-charts class="block w-full h-full" [options]="options"></ag-charts>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 md:p-6 h-105">
    <ag-charts class="block w-full h-full" [options]="chartOptions"></ag-charts>
  </div>
</div>
