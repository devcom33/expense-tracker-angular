
<div class="w-full max-w-xs">
<form [formGroup]="transactionForm" (ngSubmit)="onSubmit()" class="bg-blue-200 shadow-md rounded px-6 pt-6 pb-6 mb-4">
  <div class="mb-4">
    <label for="type">Type: </label>
    <select id="type" formControlName="type" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
        <option value="Income">Income</option>
        <option value="Expense">Expense</option>
    </select>
</div>
  <div class="mb-4">
    <label for="amount" class="block text-gray-700 text-sm font-bold mb-2" >Amount: </label>
    <input id="amount" type="number" formControlName="amount" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Amount"/>
  </div>

  <div class="mb-4">
    <label for="category" class="block text-gray-700 text-sm font-bold mb-2" >category</label>
    <select id="category" formControlName="category" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
        <option value="Housing">Housing</option>
        <option value="Food">Food</option>
        <option value="Salary">Salary</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
    </select>
  </div>
  @if (showNotes()) {
  <div class="mb-4">
    <label for="notes" class="block text-gray-700 text-sm font-bold mb-2" >notes</label>
    <input id="notes" type="text" formControlName="notes" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="Notes"/>
  </div>
}
  <div class="flex items-center justify-between">
      <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit" [disabled]="!transactionForm.valid">
        Submit
      </button>
   </div>
</form>
</div>
<p>Form Status: {{ transactionForm.status }}</p>
